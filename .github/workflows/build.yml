name: Build Launcher EXE

on:
  push:
    branches: [ main, master ]
    paths:
      - 'launcher/**'
      - '.github/workflows/**'
      - '*.txt'
      - '*.spec'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install PyInstaller
      run: pip install pyinstaller
      
    - name: Build EXE with metadata
      run: |
        pyinstaller --noconfirm L2JPlayFun-Launcher.spec
          
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: L2J-PlayFun-Launcher
        path: dist/L2J-PlayFun-Launcher.exe
        
    - name: Create Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          L2J Play Fun Launcher — автоматична збірка
          
          ⚠️ Примітка безпеки: Оскільки ця програма не підписана付费 сертифікатом, Windows Defender та Chrome можуть показувати попередження. Це нормально для безкоштовних ігрових лаунчерів. Натисніть «Детальніше» → «Виконати в будь-якому випадку» / «Keep anyway».
          
          ## Як користуватися
          1. Скачайте `L2J-PlayFun-Launcher.exe`
          2. Якщо з'явиться попередження Windows — натисніть «More info» → «Run anyway»
          3. Лаунчер працює без встановлення Python!
        files: dist/L2J-PlayFun-Launcher.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
